name: Build Windows Installer

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - main

env:
  NODE_VERSION: '20'
  APP_NAME: Screen Streamer

jobs:
  # Windows 安装程序构建
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit

      - name: Download FFmpeg
        run: |
          echo "=== Downloading FFmpeg ==="
          if (-Not (Test-Path "resources")) {
            New-Item -ItemType Directory -Path "resources" | Out-Null
          }
          if (-Not (Test-Path "resources\ffmpeg.exe")) {
            Write-Host "Downloading FFmpeg from GitHub releases..."
            # Download FFmpeg from BtbN/FFmpeg-Builds (official GitHub releases)
            $ffmpegUrl = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
            Invoke-WebRequest -Uri $ffmpegUrl -OutFile "ffmpeg.zip"
            Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_temp -Force
            Move-Item -Path "ffmpeg_temp\ffmpeg-master-latest-win64-gpl\bin\ffmpeg.exe" -Destination "resources\ffmpeg.exe" -Force
            Remove-Item -Path ffmpeg_temp -Recurse -Force
            Remove-Item -Path ffmpeg.zip -Force
            Write-Host "✓ FFmpeg downloaded successfully"
          } else {
            Write-Host "✓ FFmpeg already exists"
          }
        shell: pwsh

      - name: Verify FFmpeg
        run: |
          if (Test-Path "resources\ffmpeg.exe") {
            Write-Host "✓ FFmpeg found: resources\ffmpeg.exe"
            & .\resources\ffmpeg.exe -version | Select-Object -First 1
          } else {
            Write-Error "✗ FFmpeg not found!"
            exit 1
          }
        shell: pwsh

      - name: Build Windows Installer
        run: |
          # Set environment variables for electron-builder
          $env:CI = "true"
          $env:GH_TOKEN = "${{ secrets.GITHUB_TOKEN }}"
          npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify build output
        run: |
          Write-Host "=== Verifying Build Output ==="
          Get-ChildItem -Path dist | ForEach-Object {
            Write-Host "File: $($_.Name)"
            Write-Host "Size: $([math]::Round($_.Length / 1MB, 2)) MB"
          }
          
          $exeFiles = Get-ChildItem -Path dist -Filter *.exe
          if ($exeFiles.Count -eq 0) {
            Write-Error "✗ No .exe files found in dist/"
            exit 1
          }
          Write-Host "✓ Found $($exeFiles.Count) .exe file(s)"
        shell: pwsh

      - name: Generate SHA256 checksums
        run: |
          Write-Host "=== Generating SHA256 checksums ==="
          Set-Location dist
          Get-ChildItem -Filter *.exe | ForEach-Object {
            $hash = Get-FileHash $_.Name -Algorithm SHA256
            $hash.Hash | Out-File -FilePath "$($_.Name).sha256" -Encoding UTF8
            Write-Host "Generated: $($_.Name).sha256"
          }
          Get-ChildItem -Filter *.sha256 | ForEach-Object {
            Write-Host "Checksum content: $(Get-Content $_.Name)"
          }
          Set-Location ..
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows-installer
          path: |
            dist/*.exe
            dist/*.sha256
          retention-days: 30
          if-no-files-found: error

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.exe
            dist/*.sha256
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 便携版构建 (develop 分支)
  build-portable:
    name: Build Portable Version
    runs-on: windows-latest
    if: github.ref == 'refs/heads/develop'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Download FFmpeg
        run: |
          if (-Not (Test-Path "resources")) {
            New-Item -ItemType Directory -Path "resources" | Out-Null
          }
          if (-Not (Test-Path "resources\ffmpeg.exe")) {
            Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg.zip"
            Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_temp -Force
            Move-Item -Path "ffmpeg_temp\*\bin\ffmpeg.exe" -Destination "resources\ffmpeg.exe" -Force
            Remove-Item -Path ffmpeg_temp -Recurse -Force
            Remove-Item -Path ffmpeg.zip -Force
          }
        shell: pwsh

      - name: Build portable version
        run: npm run build:win -- --dir

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-portable
          path: dist/
          retention-days: 14

  # 代码质量检查
  lint-and-test:
    name: Code Quality
    runs-on: windows-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Verify project structure
        run: |
          Write-Host "=== Verifying Project Structure ==="
          $requiredFiles = @('main.js', 'preload.js', 'index.html', 'package.json', '.drone.yml')
          $missingFiles = @()
          
          foreach ($file in $requiredFiles) {
            if (-Not (Test-Path $file)) {
              $missingFiles += $file
            }
          }
          
          if ($missingFiles.Count -gt 0) {
            Write-Error "Missing required files: $($missingFiles -join ', ')"
            exit 1
          }
          
          Write-Host "✓ All required files present"
        shell: pwsh

      - name: Check package.json validity
        run: |
          Write-Host "=== Validating package.json ==="
          $package = Get-Content package.json -Raw | ConvertFrom-Json
          Write-Host "App Name: $($package.name)"
          Write-Host "Version: $($package.version)"
          Write-Host "✓ package.json is valid"
        shell: pwsh

  # 通知构建结果
  notify:
    name: Notify Build Status
    runs-on: ubuntu-latest
    needs: [build-windows, build-portable, lint-and-test]
    if: always()
    
    steps:
      - name: Check build status
        run: |
          echo "Build Status: ${{ needs.build-windows.result }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          
          if [ "${{ needs.build-windows.result }}" == "failure" ]; then
            echo "❌ Build failed!"
            exit 1
          elif [ "${{ needs.build-windows.result }}" == "success" ]; then
            echo "✅ Build succeeded!"
          fi
